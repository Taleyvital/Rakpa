<!DOCTYPE html>

<html class="h-full" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>

              "error-container": "#ffdad6",
              "surface-tint": "#5e5e5e",
              "inverse-surface": "#303030",
              "tertiary-container": "#747474",
              "background": "#f9f9f9",
              "surface": "#f9f9f9",

<style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000000;
        color: #ffffff;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .glow-border {
        box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.15);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-full overflow-hidden flex flex-col">
<!-- Top Navigation Anchor (Suppressing Shared Nav per Rule: Task-Focused Screen) -->
<header class="flex justify-between items-center px-6 py-8 w-full">
<div class="flex flex-col">
<span class="text-[10px] font-medium tracking-[0.2em] uppercase text-zinc-500 mb-1">Session Active</span>
<h1 class="font-black text-2xl tracking-tighter uppercase italic">Rakpa REC</h1>
</div>
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
<span class="text-[10px] font-bold tracking-widest text-zinc-400">ENREGISTREMENT</span>
</div>
</header>
<main class="flex-grow flex flex-col justify-between px-8 pb-12">
<!-- Giant Central Timer Section -->
<section class="flex flex-col items-center justify-center flex-grow py-12">
<div class="relative flex flex-col items-center">
<!-- Background visual noise for editorial feel -->
<div class="absolute -top-12 -left-12 opacity-5 pointer-events-none select-none">
<span class="text-[12rem] font-black italic leading-none">REC</span>
</div>
<h2 class="text-[8rem] md:text-[12rem] font-bold tracking-tighter leading-none mb-4 font-headline">
                    12:45
                </h2>
<div class="flex items-center gap-2 text-zinc-500">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="text-xs font-medium tracking-widest uppercase">Temps de parcours</span>
</div>
</div>
</section>
<!-- Technical Stats Dashboard: Bento-style Grid -->
<section class="grid grid-cols-2 gap-4 mb-12">
<!-- Distance Column -->
<div class="glass-effect glow-border rounded-lg p-6 flex flex-col items-center justify-center text-center">
<span class="text-[10px] font-medium tracking-widest text-zinc-500 uppercase mb-2">Distance (km)</span>
<span class="text-4xl font-bold tracking-tight">4.82</span>
</div>
<!-- GPS Points Column -->
<div class="glass-effect glow-border rounded-lg p-6 flex flex-col items-center justify-center text-center">
<span class="text-[10px] font-medium tracking-widest text-zinc-500 uppercase mb-2">Points GPS</span>
<span class="text-4xl font-bold tracking-tight">1,204</span>
</div>
</section>
<!-- Interactive Control Hub -->
<section class="flex flex-col items-center gap-8">
<!-- Central Mark Button -->
<button class="group relative flex flex-col items-center justify-center">
<div class="w-24 h-24 rounded-full bg-white text-black flex items-center justify-center shadow-2xl transition-transform duration-300 group-active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="add" style="font-variation-settings: 'wght' 400;">add</span>
</div>
<span class="mt-4 text-[10px] font-bold tracking-[0.2em] uppercase text-zinc-400">Marquer un arrêt</span>
</button>
<!-- Map Context / Visual Anchor -->
<div class="w-full h-24 rounded-lg overflow-hidden relative opacity-60 grayscale hover:grayscale-0 transition-all duration-700">
<img class="w-full h-full object-cover" data-alt="abstract top-down dark satellite map visualization of urban city grid with neon navigation lines" data-location="Paris" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCohPn_GGHaKLT4XnnJDuwP70XQH3nJaXMZsoomnQgwTFzVyeCsBLeXl7HU1b9jPlDEGbKChRKq5HPEvFao0Vbwyy9VU67jqGc7ZuYRK7Z0PtVAkWdnlYtIXKltOzUS3gklMRr8RiC8UrFjauHuTng5ADR_aY5FBG1UnJg3WPBShhzEW7MZBTX7mf-JtCujlneGzXz2yHZmwuyLy9nbpLOTlUngEMzeGTAdPC4BJBaERjgTYcCtbsZy5NbbAUuFaTflSNZghwZXmQ8"/>
<div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
<div class="absolute bottom-3 left-4 flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-white">location_on</span>
<span class="text-[10px] font-medium text-white tracking-wider">Rue de Rivoli, Paris</span>
</div>
</div>
<!-- Main Completion Action -->
<button class="w-full h-20 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold text-lg tracking-[0.15em] uppercase hover:bg-white hover:text-black transition-all duration-300 flex items-center justify-center gap-3">
<span>Terminer</span>
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
</section>
</main>
<!-- Footer Meta-Data (Editorial detail) -->
<footer class="px-8 py-6 border-t border-zinc-900 flex justify-between items-center opacity-30">
<div class="text-[8px] font-mono tracking-tighter">COORD: 48.8566 N, 2.3522 E</div>
<div class="text-[8px] font-mono tracking-tighter uppercase">RAKPA ENGINE v2.04</div>
</footer>
</body></html>
